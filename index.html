SAPC||§ 343|Обязанность ломбарда предоставлять регистр и товары для проверки|MISDEMEANOR|Отказ/уклонение от предъявления регистра, заложенных предметов или отчёта о продажах уполномоченному офицеру или по судебному приказу. Наказание: до 1 года и/или штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=343
SAPC||§ 346|Незаконная перепродажа билетов на мероприятие (скальпинг)|MISDEMEANOR|Продажа билета на развлекательное событие (полученного для перепродажи) по цене выше указанной на билете без письменного разрешения владельца/оператора площадки. Наказание: до 1 года и/или штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=346
SAPC||§ 347|Отравление пищи/воды/лекарств|FELONY|Умышленное добавление вредных веществ в еду, воду или лекарства. Наказание: 2–5–7 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=347.&lawCode=PEN
SAPC||§ 368|Преступления против пожилых и инвалидов|WOBBLER|Жестокое обращение, кража или мошенничество в отношении уязвимых лиц. До 4 лет тюрьмы (felony) или 1 года окружной (misdemeanor).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=368.&lawCode=PEN
SAPC||§ 372|Создание общественного неудобства (Public Nuisance)|MISDEMEANOR|Действия, мешающие пользованию улицей/парком (баррикады, небезопасные конструкции). До 6 месяцев окружной тюрьмы, штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=372.&lawCode=PEN
SAPC||§ 374.3|Незаконный сброс мусора/мебели|MISDEMEANOR|Выброс мебели, автошин, крупного мусора на улицу или в реку. Штраф до $3,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=374.3.&lawCode=PEN
SAPC||§ 374.4|Бросание мусора|INFRACTION|Незаконный выброс мусора, бутылок, окурков на улицу. Штраф до $1,000, при рецидиве — до 6 месяцев окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=374.4.&lawCode=PEN
SAPC||§ 402|Воспрепятствование деятельности госслужб с помощью дрона|MISDEMEANOR|Запрещено использовать дрон или наблюдать на месте инцидента, если это мешает работе государственных структур. Наказание: до $1,000 и/или до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=402
SAPC||§ 404|Бунт (Riot)|MISDEMEANOR|Участие в насильственных действиях группы (2+ человек). До 1 года окружной тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=404.&lawCode=PEN
SAPC||§ 405|Участие в массовых беспорядках|MISDEMEANOR|Участие в массовых беспорядках. Наказание: штраф до $1000 и/или арест до 1 года.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=405.&nodeTreePath=4.10&lawCode=PEN
SAPC||§ 405 (a)|Линчевание|FELONY|Насильственное освобождение задержанного из-под стражи толпой. Наказание: штраф до $10 000 и/или арест до 4 лет.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=405a.&lawCode=PEN
SAPC||409.5|Незаконное проникновение в зону перекрытия|MISDEMEANOR|Запрещается умышленное и осознанное проникновение либо пребывание в зоне, закрытой для гражданских лиц. Наказание: до 6 месяцев в окружной тюрьме и/или штраф до $1,000|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=409.5
SAPC||§ 409|Неповиновение при объявленном сборе|MISDEMEANOR|Отказ разойтись после объявления незаконного собрания. До 6 месяцев окружной тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=409.&lawCode=PEN
SAPC||§ 415|Нарушение общественного порядка|MISDEMEANOR|Запрещается провоцировать/устраивать драки или создавать громкий шум. При незначительных INF. Наказание: штраф до $250 (INF); штраф до $400 и/или до 3 месяца ареста (MIS).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=415.&lawCode=PEN
SAPC||§ 415(1)|Уличная драка|MISDEMEANOR|Участие в драке в общественном месте. До 90 дней окружной тюрьмы и/или штраф до $400.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=415.&lawCode=PEN
SAPC||§ 415(2)|Нарушение тишины|MISDEMEANOR|Громкая музыка, крики или шум, нарушающие спокойствие. До 90 дней окружной тюрьмы и/или штраф до $400.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=415.&lawCode=PEN
SAPC||§ 415(3)|Оскорбления и угрозы|MISDEMEANOR|Использование оскорблений или угроз в общественном месте, провоцирующих драку. До 90 дней окружной тюрьмы и/или штраф до $400.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=415.&lawCode=PEN
SAPC||§ 415.5|Нарушение порядка на территории школы|MISDEMEANOR|Драка, шум или хулиганство на территории любой школы, колледжа или университета. До 90 дней окружной тюрьмы и/или штраф до $400.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=415.5.&lawCode=PEN
SAPC||§ 416|Участие в незаконном собрании|MISDEMEANOR|Отказ покинуть место при указании полиции. До 6 месяцев окружной тюрьмы, штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=416.&lawCode=PEN
SAPC||§ 417|Размахивание оружием|WOBBLER|Незаконное доставание или демонстрация оружия, создающее угрозу. До 1 года окружной (misd.) или до 3 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=417.&lawCode=PEN
SAPC||§ 417.4|Угрожающее демонстрирование имитационного огнестрельного оружия|MISDEMEANOR|Каждое лицо, за исключением случаев самообороны, которое вытягивает или демонстрирует имитационное огнестрельное оружие угрожающим образом перед другим лицом, так что разумный человек испытывает страх причинения вреда. Подразумевает заключение в окружную тюрьму на срок не менее 30 дней и до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=417.4
SAPC||§ 420.1|Блокировка прохода к территории|INFRACTION|Запрещено блокирование входа, прохода, пересечения или выхода с территории. Наказание: штраф до $500|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=420.1.&nodeTreePath=4.10&lawCode=PEN
SAPC||§ 422|Угроза насилием (Criminal Threats)|WOBBLER|Угроза смерти/тяжких телесных (устно/письменно/электронно), сделанная умышленно, чтобы жертва имела страх за себя или близких. Наказание: до 1 года в окружной тюрьме и/или штраф до $1,000 (MISDEMEANOR). От 16 месяцев до 3 лет в государственной тюрьме и/или штраф до $10,000 (FELONY).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=422
SAPC||§ 451|Умышленный поджог (Arson)|FELONY|Лицо виновно в умышленном поджоге, если оно умышленно и злонамеренно поджигает, сжигает или способствует поджогу или помогает, советует или организует поджог любого строения, лесного массива или имущества. До 9 лет лишения свободы в зависимости от ущерба/наличия пострадавших.|https://leginfo.legislature.ca.gov/faces/codes_displayText.xhtml?lawCode=PEN&division=&title=13.&part=1.&chapter=1.&article=
SAPC||§ 452|Неумышленный поджог|WOBBLER|Лицо виновно в неумышленном поджоге, если оно по неосторожности поджигает, сжигает или вызывает поджог любого строения, лесного массива или имущества. До 6 лет лишения свободы или штраф до $1000 в зависимости от ущерба/наличия пострадавших.|https://leginfo.legislature.ca.gov/faces/codes_displayText.xhtml?lawCode=PEN&division=&title=13.&part=1.&chapter=1.&article=
SAPC||§ 4532|Побег из окружной тюрьмы, городской, альтернативной программы содержания, лагеря|FELONY|Побег или попытка побега из окружной тюрьмы, городской камеры (временные места содержания), во время транспортировки, программы содержания (домашний арест, электронный мониторинг, общественные работы), лагеря (Road camp, Industrial farm, County work camp) без применения силы или насилия. От 16 месяцев до 3 лет. С применением силы и насилия от 2 лет до 6 лет.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=4532.
SAPC||§ 4550|Помощь в побеге|FELONY|Содействие побегу заключённого из тюрьмы. 2–4 года тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=4550.&lawCode=PEN
SAPC||§ 4577|Запрет полёта дронов над тюрьмами и ювенальными заведениями|INFRACTION|Умышленное управление дроном над территорией тюрем, исправительных учреждений или ювенальных заведений. Штраф: $500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=4577
SAPC||§ 459|Кража со взломом|WOBBLER|Проникновение в помещение или автомобиль с намерением совершить кражу либо другое преступление. Проникновение в не жилищные помещение считается проступком, а в жилые места уголовным. Наказание: штраф до $1 000 и/или арест до 3 лет (MIS); до 6 лет тюрьмы и/или штраф $10 000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=461.&lawCode=PEN
SAPC||§ 466|Владение инструментами для взлома|MISDEMEANOR|Человек, имеющий при себе отмычку, ключ, лом, отвертку, клещи для захвата тисков, плоскогубцы для водяного насоса, скользящий молоток, натяжной брус, пистолет для отмычки, трубчатую отмычку, ударный ключ, напольный дверной съемник, мастер-ключ, керамические или фарфоровые свечи зажигания или другие инструменты с намерением преступно взломать или войти в любое здание, железнодорожный вагон, самолет или судно, вагон прицепа или транспортное средство.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=466.&lawCode=PEN
SAPC||§ 470|Подделка документов и печатей|WOBBLER|Подделка подписей, печатей, чеков, официальных бумаг, удостоверений и иных документов с умыслом на мошенничество. Наказание: до 1 года окружной тюрьмы или 16 мес.–3 лет тюрьмы штата. Если подделка чека на сумму до $950 - только до 1 года окружной|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=473.&lawCode=PEN
SAPC||§ 472|Подделка печатей и государственных документов|FELONY|Использование или изготовление поддельных гос. печатей и удостоверений. До 3 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=472.&lawCode=PEN
SAPC||§ 484|Кража (Theft)|WOBBLER|Незаконное присвоение чужого имущества. Наказание зависит от стоимости (§ 490): petty theft — до 6 мес. тюрьмы; grand theft (§ 489) — 16 мес.–3 лет.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=490.&lawCode=PEN
SAPC||§ 485|Присвоение найденной чужой собственности|WOBBLER|Присвоение найденного имущества при знании или наличии способов установить владельца. Наказание: до 6 мес. и/или $1,000 (MIS); до 3 лет и/или $10,000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=485
SAPC||§ 487|Grand Theft (Крупная кража)|FELONY|Кража имущества свыше $950, огнестрельного оружия или автомобиля. Наказание (§ 489): 16 мес.–3 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=489.&lawCode=PEN
SAPC||§ 488|Petty Theft (Мелкая кража)|MISDEMEANOR|Кража имущества стоимостью до $950. Наказание (§ 490): до 6 месяцев окружной тюрьмы, штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=490.&lawCode=PEN
SAPC||§ 496|Использование украденного имущества|WOBBLER|Запрещается владение, получение, покупка или продажа украденного имущества, а также сокрытие или помощь в его сокрытии, продаже или удержании при наличии информации, что имущество было украдено или получено в результате вымогательства. Наказание: штраф до $1.000 и/или арест до 1 года (MIS); лишение свободы до 3 лет и/или штраф до $10.000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=496.
SAPC||§ 496(d)|Использование украденного (угнанного) транспортного средства|WOBBLER|Запрещается владение, получение, покупка или продажа украденного (угнанного) транспортного средства, а также сокрытие или помощь в его сокрытии, продаже или удержании при наличии информации, что транспортного средства было украдено (угнано) или получено в результате вымогательства. Наказание: штраф до $1.000 и/или арест до 1 года (MIS); лишение свободы до 3 лет и/или штраф до $10.000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=496d.
SAPC||§ 503|Присвоение (Embezzlement)|WOBBLER|Незаконное присвоение доверенного имущества. До 3 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=503.&lawCode=PEN
SAPC||§ 518|Вымогательство (Extortion)|FELONY|Принуждение к передаче имущества через угрозы или насилие. Наказание (§ 520): 2–4 года тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=520.&lawCode=PEN
SAPC||§ 529|Выдача себя за другое лицо|WOBBLER|Выдача себя за другое лицо ради получения выгоды или возложения ответственности на этого человека. До 1 года тюрьмы и/или штраф до $10 000(MIS) или до 3-х лет тюрьмы и/или штраф до $10 000|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=529.&lawCode=PEN
SAPC||§ 530.5(a)|Кража личности|WOBBLER|Умышленное получение персональных идентифицирующих данных другого лица без его согласия и их использование в незаконных целях, в том числе с намерением совершить мошенничество. До 1 года окружной и/или штраф до $1 000 (misd.) или до 3 лет тюрьмы и/или штраф до $10 000 (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=530.5.&lawCode=PEN
SAPC||530.5(d)|Продажа персональных данных|FELONY|Передача или продажа чужих персональных данных для их незаконного использования без согласия обладателя. До 1-го года тюрьмы и/или штраф $10 000|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=530.5.&lawCode=PEN
SAPC||§ 532|Мошенничество (False Pretenses)|WOBBLER|Получение имущества путём обмана. До 3 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=532.&lawCode=PEN
SAPC||§ 532(b)|Ложное представление себя ветераном вооружённых сил|MISDEMEANOR|Лицо, которое ложно представляет себя ветераном вооружённых сил США с целью какой-либо выгоды. Наказание: штраф до $1 000 и/или арест до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=532b
SAPC||§ 537|Мошенничество в сфере услуг|WOBBLER|Уклонение от оплаты услуг в гостинице, ресторане, такси или на заправке, а также иных сервисов и услуг. До 6 мес. (misd.) и штраф до 1000$ или до 1 года (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=537.&lawCode=PEN
SAPC||§ 538(d)|Выдача себя за сотрудника правоохранительных органов|WOBBLER|Любое лицо, которое намеренно выдает себя за сотрудника правоохранительных органов (федерального, штата или местного), и/или носит, демонстрирует или использует любую эмблему, значок, удостоверение, нашивку, одежду или отличительный знак сотрудника правоохранительных органов с целью ввести в заблуждение, является виновным в данном правонарушении. Наказание: MIS - Лишение свободы до 1-го года и/или штраф до $1000. FEL - Лишение свободы до 3-х лет.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=538d
SAPC||§ 538(e)|Выдача себя за пожарного|MISDEMEANOR|Использование элементов одежды с символикой пожарной службы (или похожих на них) с целью выдать себя за пожарного, включая интернет. Наказание: штраф до $2 000 и/или арест до 1 года.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=538e
SAPC||§ 550|Страховое мошенничество|FELONY|Фальсификация страховых случаев, заявлений или ущерба. До 5 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=550.&lawCode=PEN
SAPC||§ 594|Вандализм|WOBBLER|Умышленная порча или разрушение чужого имущества. Если ущерб < $400 — до 1 года окружной (misdemeanor). Если > $400 — до 3 лет (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=594.&lawCode=PEN
SAPC||§ 594.7|Неумышленное повреждение имущества штата/города/округа|INFRACTION|Неумышленное повреждение гос/муниц имущества по неосторожности. Возмещение ущерба. Штраф: до $500 при ущербе < $950; до $1,000 при ущербе ≥ $950. При скрытии с места — см. §20002.|https://leginfo.legislature.ca.gov/faces/codes_displayText.xhtml?lawCode=VEH&division=9.&title=&part=&chapter=1.&article=3.
SAPC||§ 597|Жестокое обращение с животными|WOBBLER|Умышленное причинение боли или страданий животному. Неисполнение владельцем своих обязанностей по уходу за домашним животным, а также беспечные проступки, способные привести к причинению вреда здоровью или смерти домашнего животного. До 1 года окружной тюрьмы и/или штраф в размере до $20.000 (misdemeanor). До 3 лет тюрьмы и штраф в размере до $20.000 (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=597.&lawCode=PEN
SAPC||§ 597.7|Оставление животного в автомобиле|MISDEMEANOR|Оставление животного в автомобиле в условиях, угрожающих его здоровью. Наказание: без вреда животному штраф $100 за каждого, если есть вред или нарушение повторное - штраф до $500 и/или арест до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=597.7
SAPC||§ 602|Незаконное проникновение (Trespass)|MISDEMEANOR|Незаконное вторжение на чужую территорию, включая гос. здания. До 6 месяцев окружной тюрьмы, штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=602.&lawCode=PEN
SAPC||§ 602(o)|Незаконное проникновение в транспорт/метро|MISDEMEANOR|Вход на закрытые транспортные объекты (депо, рельсы, тоннели). До 6 месяцев окружной, штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=602.&lawCode=PEN
SAPC||§ 602(m)|Сквоттинг|MISDEMEANOR|Незаконное занятие или проживание в чужом здании/помещении без разрешения владельца. До 6 месяцев окружной тюрьмы и/или штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=602.&lawCode=PEN
SAPC||§ 602.1|Нарушение правил бизнеса|MISDEMEANOR|Препятствование законной коммерческой деятельности, нарушение правил коммерческого предприятия. Отказ покинуть коммерческое предприятия по требованию владельца или сотрудника охраны. До 90 дней окружной тюрьмы и/или штраф до $400.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=602.1.&lawCode=PEN
SAPC||§ 602.7|Катание на велосипеде/скейтборде в запрещённых местах|INFRACTION|Использование велосипеда, скейта или роликов в зонах, где это запрещено (мэрия, бизнес-центры, паркинги). Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=602.7.&lawCode=PEN
SAPC||§ 632|Незаконная запись конфиденциальных разговоров|WOBBLER|Запрещено записывать конфиденциальные разговоры без согласия сторон. Наказание: до $2,500 и/или до 1 года (MIS); до $10,000 и/или до 3 лет (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=632
SAPC||§ 640|Безбилетный проезд|MISDEMEANOR|Умышленное пользование общественным транспортом без действительного билета/оплаты; поддельный/чужой проездной документ. Наказание: штраф до $250; при отягчающих — до 6 месяцев и/или до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=640
SAPC||§ 646.9|Преследование (Stalking)|WOBBLER|Каждое лицо, которое умышленно преследует или угрожает другому человеку, что этот человек обоснованно опасается за свою безопасность или за безопасность своих близких. Наказание (MISDEMEANOR): тюремное заключение в окружной тюрьме до 1 года и/или штраф до $1,000. Наказание (FELONY): тюремное заключение в государственной тюрьме сроком от 16 месяцев до 3 лет и/или штраф до $10,000. Если преступление совершено при наличии действующего судебного запрета — автоматически квалифицируется как FELONY, с наказанием до 3 лет лишения свободы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=646.9
SAPC||§ 647|Нарушения общественной морали|MISDEMEANOR|Проституция, попрошайничество, непристойное поведение, бродяжничество. До 6 месяцев окружной тюрьмы, штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=647.&lawCode=PEN
SAPC||§ 647(c)|Нарушение пешеходного движения (Obstructing Sidewalk)|MISDEMEANOR|Создание препятствий движению по тротуару или улице. До 90 дней окружной, штраф до $400.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=647.&lawCode=PEN
SAPC||§ 647(f)|Публичное опьянение (Public intoxication)|MISDEMEANOR|Нахождение в общественном месте в состоянии опьянения, при котором лицо не способно заботиться о безопасности (своей/чужой) и/или препятствует свободному пользованию улицей/тротуаром/путём. Наказание: до $1,000 и/или до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=647&lawCode=PEN
SAPC||§ 647(j)|Скрытая съёмка или подглядывание|MISDEMEANOR|Незаконная скрытая съёмка/запись или наблюдение за человеком в частном месте. Наказание: до $1,000 и/или до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=647
SAPC||§ 653(m)|Навязчивые, угрожающие или непристойные телефонные звонки|MISDEMEANOR|Повторные звонки/сообщения или электронная связь с намерением раздражать, угрожать или беспокоить; передача угроз/оскорблений/непристойного контента. Наказание: до 6 месяцев и/или штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=653m
SAPC||§ 653.22|Бродяжничество с целью проституции|MISDEMEANOR|Находиться в общественном месте с целью предложения или поиска сексуальных услуг. До 6 месяцев окружной тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=653.22.&lawCode=PEN
SAPC||§ 653x|Злоупотребление системой экстренных вызовов 911|MISDEMEANOR|Лицо, которое звонит или использует электронное устройство для инициирования связи с системой экстренных вызовов 911 с целью надоесть или преследовать другого человека, признаётся виновным в совершении проступка. Намерение надоесть или преследовать устанавливается доказательством повторяющихся звонков или сообщений в течение некоторого времени, каким бы коротким оно ни было, которые являются неразумными в данных обстоятельствах. Штраф до $1,000, лишение свободы в окружной тюрьме до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=653x
SAPC||§ 664|Попытка совершить преступление|INFO|Каждое лицо, которое пытается совершить преступление, но терпит неудачу или ему мешают или его останавливают при совершении преступления, подлежит наказанию в виде половины срока или штрафа, предусмотренного за завершенное преступление. В случае если наказание за преступление подразумевает пожизненное заключение, то человек наказывается лишением свободы до 5, 7 или 9 лет. Исключение: попытка совершения убийства первой степени (§190(a)) будет наказываться заключением от 15 лет до пожизненного.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=664.
SAPC||§ 836.6|Побег из-под стражи|WOBBLER|Побег или попытка побега при аресте или задержании сотрудником полиции. Наказание: штраф до $1 000 и/или арест до 1 года (MIS); штраф до $10 000 и/или арест до 3-х лет (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=836.6.&lawCode=PEN
SAPC||§ 978.5|Судебный ордер на арест (Bench Warrant)|INFO|Суд может выдать судебный ордер на арест, если обвиняемый не является в суд в назначенное время после освобождения под залог, под подписку о явке, по повестке или в связи с неоплатой штрафа. Ордер действует на территории любого округа и позволяет задержать лицо для доставки в суд.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=978.5.&lawCode=PEN
SAPC||§ 1203.2|Нарушение условий пробации / УДО|INFO|При наличии оснований полагать, что лицо нарушило условия пробации или условно досрочного освобождения, сотрудник может произвести повторный арест без ордера. С дальнейшим решением суда об отмене освобождения.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=1203.2
SAPC||§ 1320|Неявка в суд|MISDEMEANOR|Неявка в суд без уважительной причины по вызову (обвиняемый/свидетель/слушание). Наказание: до 1 года и/или штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=1320&lawCode=PEN
SAPC||§ 16700|Определение имитационного огнестрельного оружия|INFO|Имитационное огнестрельное оружие означает любое устройство, включая игрушечное или реплицированное оружие, которое настолько похоже по виду и цвету на настоящее, что разумный человек мог бы принять его за реальное.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=16700
SAPC||§ 18710|Владение взрывных устройств|FELONY|Незаконное хранение бомб, гранат, самодельных взрывных устройств. До 3 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18710.&lawCode=PEN
SAPC||§ 18720|Изготовление взрывчатки|FELONY|Изготовление или сборка взрывных устройств. Наказание — 2–4 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18720.&lawCode=PEN
SAPC||§ 18725|Продажа или передача взрывных устройств|FELONY|Передача или сбыт взрывных устройств. До 4 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18725.&lawCode=PEN
SAPC||§ 18730|Перевозка или хранение взрывных устройств|FELONY|Перемещение или укрытие взрывных устройств. До 4 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18730.&lawCode=PEN
SAPC||§ 18740|Использование взрывных устройств|FELONY|Применение взрывного устройства с целью причинить вред. До 7 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18740.&lawCode=PEN
SAPC||§ 18745|Взрыв жилого здания или транспорта|FELONY|Использование взрывчатки против жилья или транспорта. Наказание — 4–10 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18745.&lawCode=PEN
SAPC||§ 18750|Взрыв с тяжкими последствиями|FELONY|Взрывчатка, повлекшая смерть или серьёзные увечья. Наказание — пожизненное заключение.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18750.&lawCode=PEN
SAPC||§ 18755|Использование при отягчающих обстоятельствах|FELONY|Применение взрывного устройства, повлёкшее смерть или тяжкие последствия. Наказание — пожизненное.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=18755.&lawCode=PEN
SAPC||§ 19706|Уклонение от уплаты налогов|FELONY|Умышленное уклонение от уплаты налога: сокрытие доходов, занижение базы, ложная декларация или иное мошенническое уменьшение налоговых обязательств. Наказание: до 3 лет и/или штраф до $20,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=19706&lawCode=RTC
SAPC||§ 20170|Демонстрация имитационного оружия в общественном месте|WOBBLER|Никто не может открыто демонстрировать или показывать имитационное огнестрельное оружие в общественном месте. За первое нарушение предусмотрен штраф (INFRACTION) в размере 100 $, за второе — 300 $, а за третье и последующие — уголовное правонарушение (MISDEMEANOR) с возможным арестом до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=20170
SAPC||§ 21310|Скрытое ношение холодного оружия|WOBBLER|Скрытое ношение холодного оружия, готового к применению как колюще-режущее. Исключение: открытая переноска в ножнах не является скрытым ношением. Наказание: до $1,000 и/или до 1 года (MIS); до 3 лет и/или до $10,000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=21310.
SAPC||§ 21510|Превышение длины клинка выкидного/автоматического ножа|MISDEMEANOR|Запрещено носить/иметь в доступной зоне авто/хранить в общественном месте/продавать или передавать выкидные/автоматические ножи с клинком 2+ дюйма. Наказание: конфискация, до $1,000 и/или до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=21510.
SAPC||§ 23920|Владение оружием с измененным серийным номером|MISDEMEANOR|Лицо, которое с осознанием того, что идентификация оружия изменена или удалена, владеет, покупает, продаёт, передаёт или предлагает к продаже такое оружие — признаётся виновным. До 1 года в окружной тюрьме/Штраф до 1.000$|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23920&lawCode=PEN
SAPC||§ 25400|Скрытое оружие (CCW)|WOBBLER|Незаконное скрытое ношение огнестрела. Наказание (§ 25400(c)): до 1 года окружной или 16 мес.–3 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=25400.&lawCode=PEN
SAPC||§ 25610|Нарушение правил транспортировки огнестрельного оружия|WOBBLER|Лицо должно перевозить огнестрельное оружие разряженным и в запертом контейнере, чехле или багажнике, если транспортируется вне места постоянного хранения. Штраф до $1,000 и/или до 6 месяцев в окружной тюрьме. Felony - при отягчающих обстоятельствах.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=25610&lawCode=PEN
SAPC||§ 25850|Заряженное оружие в публичном месте|WOBBLER|Владение заряженным огнестрелом в общественном месте. Наказание (§ 25850(c)): до 1 года окружной или 16 мес.–3 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=25850.&lawCode=PEN
SAPC||§ 26100|Стрельба из автомобиля|FELONY|Стрельба из авто или по нему. Наказание (§ 26100(d)): 3–7 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=26100.&lawCode=PEN
SAPC||§ 26350|Открытое ношение пистолета|MISDEMEANOR|Открытое ношение незаряженного пистолета/револьвера в общественном месте. До 1 года окружной тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=26350.&lawCode=PEN
SAPC||§ 27545|Незаконная продажа оружия|FELONY|Передача или продажа огнестрельного оружия без лицензированного посредника (FFL). До 4 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=27545.&lawCode=PEN
SAPC||§ 29800|Владение оружием запрещёнными лицами|FELONY|Запрещено владение огнестрелом лицами с фелони или наркозависимостью. Наказание — до 3 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=29800.&lawCode=PEN
SAPC||§ 29805|Владение оружием после судимости (Misdemeanor)|MISDEMEANOR|Лица с судимостью за насильственное misdemeanor не могут владеть оружием 10 лет. Нарушение — до 1 года окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=29805.&lawCode=PEN
SAPC||§ 29900|Владение оружием после тяжких фелони|FELONY|Владение огнестрелом после осуждения за особо тяжкие преступления (убийство, ADW и др.). Наказание — до 3 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=29900.&lawCode=PEN
SAPC||§ 30305|Незаконное хранение боеприпасов|WOBBLER|Владение патронами лицами, которым запрещено владеть оружием. До 1 года окружной (misd.) или до 3 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=30305.&lawCode=PEN
SAPC||§ 30310|Незаконная передача боеприпасов|MISDEMEANOR|Продажа или передача патронов без лицензии. До 6 месяцев окружной тюрьмы и штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=30310.&lawCode=PEN
SAPC||§ 30600|Штурмовое оружие и .50 BMG|FELONY|Производство, продажа или передача штурмового оружия или винтовок .50 BMG. Наказание — 4–8 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=30600.&lawCode=PEN
SAPC||§ 30605|Владение штурмовым оружием|FELONY|Незаконное хранение штурмового оружия или .50 BMG. Наказание — до 3 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=30605.&lawCode=PEN
SAPC||§ 33600|Изготовление или хранение самодельного оружия|WOBBLER|Каждое лицо, которое производит, импортирует, предлагает к продаже, передаёт или хранит так называемое zip gun - самодельное оружие, не соответствующее заводским стандартам безопасности. Лишение свободы до 1 года в окружной тюрьме или до 3 лет в зависимости от обстоятельств.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=PEN&sectionNum=33600
SAVC||§ 2800|Невыполнение приказа инспектора SAHP|MISDEMEANOR|Водитель коммерческого ТС обязан подчиняться требованиям инспектора SAHP. Наказание — до 6 мес. окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2800.&lawCode=VEH
SAVC||§ 2800.1|Уклонение от полиции|MISDEMEANOR|Умышленное уклонение или отказ водителя остановится после поданного сигнала. Наказание: штраф до $1 000 и/или арест до 1 года.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2800.1.&lawCode=VEH
SAVC||§ 2800.2|Уклонение с опасным вождением|FELONY|Побег от полиции с нарушением правил, создающим опасность для жизни. Наказание — 16 мес.–3 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2800.2.&lawCode=VEH
SAVC||§ 2800.3|Уклонение с причинением вреда|FELONY|Побег от полиции, повлекший тяжкие телесные повреждения или смерть. Наказание: 3–7 лет (при травмах) или 4–10 лет (при смерти).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2800.3.&lawCode=VEH
SAVC||§ 2800.4|Уклонение по встречке/тротуарам|FELONY|Побег от полиции с движением по встречке или по тротуарам. Наказание — 6 мес.–1 год окружной или до 3 лет тюрьмы штата.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2800.4.&lawCode=VEH
SAVC||§ 2801|Отказ подчиниться регулировщику|MISDEMEANOR|Запрещено игнорировать указания полицейского/регулировщика при управлении движением. До 6 месяцев окружной тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2801.&lawCode=VEH
SAVC||§ 2807|Осмотр автобусов и школьного транспорта|MISDEMEANOR|Автобусы и школьные транспортные средства должны проходить регулярные осмотры SAHP. Нарушение — misdemeanor.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2807.&lawCode=VEH
SAVC||§ 2814.2|Отказ остановиться на DUI Checkpoint|MISDEMEANOR|Водитель обязан остановиться на контрольном пункте полиции. Наказание — до 6 месяцев окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2814.2.&lawCode=VEH
SAVC||§ 2818|Объезд дорожного блока/ограждения|INFRACTION|Запрещено игнорировать блокпосты и временные ограждения (например, SAHP). Штраф до $500 или до 6 месяцев окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=2818.&lawCode=VEH
SAVC||§ 4000|Вождение или парковка без регистрации|INFRACTION|Запрещено управлять автомобилем или парковать его на дорогах общего пользования без действующей регистрации. В случае просрочки регистрации более, чем на 2 месяцев, в случае повторного нарушения, а также в случае невозможности связаться с владельцем припаркованного автомобиля, автомобиль подлежит эвакуации. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=4000.&lawCode=VEH
SAVC||§ 4150|Несоответствие автомобиля его регистрационным данным|INFRACTION|Регистрационные данные автомобиля должны содержать корректные и актуальные данные о владельце, марке, кузове и модели авто, а также о его цвете, VIN-номере и актуальных модификациях. Наказание: штраф до $200.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=4150.
SAVC||§ 4462|Непредъявление регистрации|INFRACTION|Водитель обязан предъявить свидетельство о регистрации ТС по требованию полиции. От штрафа до 6 месяцев окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=4462.&lawCode=VEH
SAVC||§ 4463|Мошенничество при регистрации транспортного средства|WOBBLER|Запрещено умышленно подделывать, изменять, фальсифицировать или использовать с целью обмана любые официальные документы или номерные знаки, включаяя подделку самих металлических номеров, наклеек (стикеров) о регистрации, регистрационных карт или свидетельств о праве собственности. Наказание: MIS - лишение свободы до 1 года и/или штраф до $1000, FEL - лишение свободы до 3 лет и штраф до $10000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=4463&lawCode=VEH
SAVC||§ 5200|Отсутствие государственных номеров|INFRACTION|Транспортное средство должно иметь номерные знаки департамента, установленные спереди и сзади. Если конструкция допускает установку только одного знака, он должен быть размещён сзади. Штраф - до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=5200.&lawCode=VEH
SAVC||§ 5201|Неправильное крепление или скрытие номеров|INFRACTION|Номера должны быть чистыми, видимыми и закреплёнными без искажений. Штраф — до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=5201.&lawCode=VEH
SAVC||§ 5204|Нарушение правил, связанных с регистрационными наклейками (стикерами)|WOBBLER|Актуальные регистрационные наклейки (стикеры), выданные DMV, должны быть надлежащим образом прикреплены (приклеены) к заднему номерному знаку автомобиля в специально отведенном месте. Если регистрационная информация стикера просрочена более, чем на два месяца, автомобиль подлежит эвакуации. Наказание: штраф до $25.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=5204&lawCode=VEH
SAVC||§ 10751|Владение транспортным средством с изменённым VIN|WOBBLER|Владение автомобилем или его частью, если идентификационный номер (VIN) был изменен. Любой автомобиль который попадает под стражу, подлежит изъятию и утилизации. Наказание: арест до 6 месяцев и/или штраф до $1000 (MIS); арест до 3 лет и/или штраф до $5000 (FEL)|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=10751
SAVC||§ 10801|Владение или управление точкой разборки угнанных автомобилей|WOBBLER|Владение или управление местом, где осуществляется хранение или продажа автомобилей или их частей, полученных преступным путём. Наказание: арест до 1 года и/или штраф до $1,000 (MIS); арест до 4 года тюрьмы и/или штраф до $50,000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=10801
SAVC||§ 10802|Изменение VIN с целью сокрытия или продажи|WOBBLER|Умышленное изменение идентификационного номера (VIN) с целью сокрытия или для передачи автомобиля или его частей. Наказание: арест до 1 года и/или штраф до $1,000 (MIS); арест до 3 года тюрьмы и/или штраф до $25,000 (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=10802
SAVC||§ 10855|Невозврат арендованного транспортного средства|INFO|Лицо, которое арендовало автомобиль по договору и умышленно не вернуло его владельцу в течение 5 дней после истечения срока аренды, считается совершившим присвоение (SAPC § 487/503).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=10855
SAVC||§ 10856|Вмешательство в эвакуацию|MISDEMEANOR|Запрещается мешать законной эвакуации или транспортировке автомобиля. Наказание: штраф до $1 000 и/или до 1 года ареста.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=10856
SAVC||§ 12500|Вождение без лицензии|WOBBLER|Управление транспортным средством при отсутствии права управления транспортными средствами соответствующей категории, подтверждающего право управления или наличие необходимых разрешений. INF — штраф до $250. MIS — штраф до $1,000 и/или до 6 месяцев окружной тюрьмы (для повторных нарушений или при отягчающих обстоятельствах).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=12500.&lawCode=VEH
SAVC||§ 12814.6|Нарушение ограничений водительской лицензии несовершеннолетнего|INFRACTION|Несовершеннолетнему водителю запрещается управлять с 23:00 до 5:00 и перевозить пассажиров младше 20 лет без законного основания. Наказание: первый штраф до $35, за второй штраф и последующие до $50|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=12814.6
SAVC||§ 12951|Отсутствие водительского удостоверения при себе|INFRACTION|Водитель обязан иметь при себе и предъявить права по требованию полиции. Нарушение — штраф (infraction), отказ предъявить — misdemeanor (до 6 мес. окружной).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=12951.&lawCode=VEH
SAVC||§ 14601|Вождение при лишённых правах|MISDEMEANOR|Управление при приостановленных или аннулированных правах. До 6 месяцев окружной тюрьмы и штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=14601.&lawCode=VEH
SAVC||§ 14601.2|Вождение при лишении за DUI|MISDEMEANOR|Вождение авто после лишения прав за DUI. Минимум 10 дней, максимум 6 месяцев окружной тюрьмы и штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=14601.2.&lawCode=VEH
SAVC||§ 14601.5|Вождение при административном лишении (отказ от теста)|MISDEMEANOR|Вождение при приостановке лицензии из-за отказа от теста на алкоголь/наркотики. До 6 месяцев окружной тюрьмы и штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=14601.5.&lawCode=VEH
SAVC||§ 14610|Незаконное отображение или владение аннулированной / отозванной / приостановленной водительской лицензией|MISDEMEANOR|Умышленное использование, демонстрация, передача или хранение водительской лицензии, заведомо аннулированной, отозванной, приостановленной, поддельной или недействительной, является правонарушением. К нарушению также относятся подделка, изменение, копирование, продажа, передача лицензии и использование лицензии другого лица. Штраф до $1,000, лишение свободы в окружной тюрьме до 6 месяцев.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=14610
SAVC||§ 16028|Отсутствие / отказ предоставить доказательства финансовой ответственности (вождение без страховки)|INFRACTION|Все водители и владельцы моторных транспортных средств обязаны в любое время иметь действующее доказательство финансовой ответственности (страховки) и предъявлять его по запросу офицера полиции (включая электронный формат на мобильном устройстве). Доказательство может включать страховой полис, сертификат самострахования или депозит в DMV. Штраф за первое нарушение от $100 до $200, за последующие в течение трех лет - от $200 до $500|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=16028.&lawCode=VEH
SAVC||§ 20001|ДТП с ранеными/смертью (Hit and Run)|FELONY|Водитель обязан остановиться, оказать помощь и сообщить в полицию. За побег — 16 мес.–4 лет тюрьмы и штраф $1,000–$10,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=20001.&lawCode=VEH
SAVC||§ 20002|ДТП с материальным ущербом|MISDEMEANOR|Водитель обязан остановиться и обменяться данными. За побег — до 6 месяцев окружной тюрьмы и штраф до $1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=20002.&lawCode=VEH
SAVC||§ 20003|Обязанность сообщить сведения о ДТП|WOBBLER|Водитель обязан предоставить данные о себе и пострадавших. За нарушение — до 1 года окружной (misd.) или до 4 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=20003.&lawCode=VEH
SAVC||§ 20004|ДТП со смертельным исходом — сообщение властям|FELONY|При аварии со смертью водитель обязан незамедлительно сообщить в полицию/шерифу. За нарушение — 90 дней до 1 года окружной или 2–4 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=20004.&lawCode=VEH
SAVC||§ 21200|ПДД для велосипедистов|INFRACTION|Велосипедисты обязаны соблюдать ПДД: движение по полосам, сигналы поворота, освещение ночью. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21200.&lawCode=VEH
SAVC||§ 21200.5|Вождение велосипеда под алкоголем|MISDEMEANOR|Запрещено управлять велосипедом в состоянии алкогольного/наркотического опьянения. До $250 штрафа.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21200.5.&lawCode=VEH
SAVC||§ 21203|Запрещено цепляться за транспортное средство|INFRACTION|Запрещается, будучи на мотоцикле/велосипеде или ином подобном устройстве, цепляться за другое транспортное средство во время движения по проезжей части. Наказание: штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21203
SAVC||§ 21210|Неправильная парковка велосипеда|INFRACTION|Запрещается оставлять велосипед лежащим на тротуаре или парковать его таким образом, чтобы он препятствовал свободному проходу пешеходов. Наказание: штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21210
SAVC||§ 21211|Препятствование движению на велосипедной дорожке|INFRACTION|Запрещается находиться или размещать любые предметы на велосипедной дорожке, если это мешает движению. Наказание: штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21211
SAVC||§ 21212|Велосипедисты без шлема (до 18 лет)|INFRACTION|Дети и подростки обязаны ездить в шлеме. Нарушение — штраф $25.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21212.&lawCode=VEH
SAVC||§ 21213|Ограничения для электрических велосипедов (возраст и шлем)|INFRACTION|Лицо в возрасте до 16 лет не имеет права управлять электрическим велосипедом. Также водитель и пассажир обязаны использовать шлем. Наказание: штраф $25.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21213
SAVC||§ 21453|Проезд на красный свет|INFRACTION|Водитель обязан остановиться на красный сигнал светофора. Нарушение — штраф $100–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21453.&lawCode=VEH
SAVC||§ 21457|Игнорирование мигающего красного (Stop Signal)|INFRACTION|Водитель обязан полностью остановиться на мигающий красный сигнал. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21457.&lawCode=VEH
SAVC||§ 21460|Пересечение двойной сплошной|INFRACTION|Запрещено пересекать двойную сплошную линию разметки, кроме разрешённых случаев. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21460.&lawCode=VEH
SAVC||§ 21461|Нарушение дорожных знаков и сигналов|INFRACTION|Запрещено игнорировать знаки «Stop», «Yield» и иные предписывающие знаки. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21461.&lawCode=VEH
SAVC||§ 21464|Вмешательство или порча устройств регулирования движения|WOBBLER|Запрещено портить/снимать/сбивать/загораживать или иначе вмешиваться в работу устройств регулирования движения (светофоры, знаки и др.). Наказание: до 6 мес. и/или $5,000 (MIS); до 3 лет и/или $10,000 при травмах/смерти (FEL).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21464
SAVC||§ 21650.1|Движение велосипеда в том же направлении, что и транспортные средства|INFRACTION|Велосипедист обязан двигаться по проезжей части или обочине в том же направлении, что и транспортные средства. Штраф: до $197.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21650.1
SAVC||§ 21651(a)|Пересечение разделительной разметки/зоны|INFRACTION|Запрещено движение через разделительные барьеры или разметку разделенного шоссе, а также выполнение левых поворотов и разворотов, кроме специально обозначенных мест. Штраф до 250$.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21651.
SAVC||§ 21651(b)|Движение по полосе встречного движения|WOBBLER|Запрещено движение по любой части проезжей части, кроме правой. Исключение — объезд препятствия, если он выполняется безопасно и не создает помех другим участникам движения.MIS — Штраф до $1000 и/или тюремное заключение до 1 года в окружной тюрьме. FEL — Привело к травмам/смерти - тюремное заключение от 16 месяцев до 3 лет в тюрьме штата и штраф до $10000, изъятие DL.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21651
SAVC||§ 21654|Движение на шоссе со скоростью ниже обычной|INFRACTION|Движение на шоссе со скоростью ниже обычной скорости потока в левой полосе, когда правая свободна, за исключением обгона или поворота налево. Наказание: штраф от $150 до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21654
SAVC||§ 21658.1|Lane Splitting (между полосами)|INFO|В Сан-Андреас разрешено движение мотоциклов между полосами при соблюдении разумной осторожности.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21658.1.&lawCode=VEH
SAVC||§ 21663|Движение по тротуару|INFRACTION|Управление транспортным средством по тротуару, вместо проезжей части дороги. Штраф от 100$ до 500$.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21663.
SAVC||§ 21703|Несоблюдение дистанции|INFRACTION|Водитель механического транспортного средства не должен следовать за другим транспортным средством на более близком расстоянии, чем это разумно и целесообразно, с учётом скорости такого транспортного средства, интенсивности движения и состояния проезжей части. Наказание: штраф до 250$.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=21703
SAVC||§ 21706|Следование слишком близко за экстренными ТС|INFRACTION|Запрещено ехать на расстоянии ближе 300 футов за машиной экстренных служб с включенными огнями и сиренами. Штраф до $500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21706.&lawCode=VEH
SAVC||§ 21712|Перевозка людей в местах, не предназначенных для этого|INFRACTION|Перевозка людей в не предназначенной для этого местах, включая багажник, внешние части автомобиля, буксируемые транспортные средства и т.д. Наказание: штраф $100 (1-ое); штраф $200 (2-ое); штраф $250 (3-е и далее).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21712.&lawCode=VEH
SAVC||§ 21718|Остановка на автомагистрали|INFRACTION|Остановка или парковка на автомагистрали, кроме аварийных случаев. Наказание: штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21718.&lawCode=VEH
SAVC||§ 21750|Неправильный обгон|INFRACTION|Обгон без соблюдения условий безопасности. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21750.&lawCode=VEH
SAVC||§ 21755|Опасный обгон справа|INFRACTION|Опасный обгон справа при отсутствии условий безопасности. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21755.&lawCode=VEH
SAVC||§ 21801|Нарушение правила разворота/левого поворота|INFRACTION|При развороте или левом повороте водитель обязан уступить встречному транспорту. Штраф — до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21801.&lawCode=VEH
SAVC||§ 21802|Нарушение Stop (уступи дорогу)|INFRACTION|Водитель обязан уступить движение при знаке Stop. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21802.&lawCode=VEH
SAVC||§ 21804|Выезд со второстепенной дороги|INFRACTION|Водитель обязан уступить транспортным средствам на главной дороге. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21804.&lawCode=VEH
SAVC||§ 21806|Не уступил дорогу экстренным службам|INFRACTION|Водитель обязан останавливаться при включённых красных сигналах и сирене. Штраф до $500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21806.&lawCode=VEH
SAVC||§ 21950|Нарушение правил пешеходами|INFRACTION|Пешеход обязан переходить дорогу по переходу и уступать движению, если внезапно выбегает. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21950.&lawCode=VEH
SAVC||§ 21955|Jaywalking (переход вне перехода)|INFRACTION|Пешеход обязан пересекать дорогу по зебре или на зелёный сигнал. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21955.&lawCode=VEH
SAVC||§ 21957|Хождение по проезжей части|INFRACTION|Запрещено двигаться пешком по проезжей части вне тротуара или обочины. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21957.&lawCode=VEH
SAVC||§ 21970|Блокирование пешеходного перехода|INFRACTION|Запрещено останавливать авто на crosswalk, создавая помехи пешеходам. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=21970.&lawCode=VEH
SAVC||§ 22100|Нарушение правил выполнения поворота направо|INFRACTION|При повороте направо, водитель обязан занять крайнее правое положение. Наказание: штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22100
SAVC||§ 22101|Нарушение правил поворота|INFRACTION|Движение вразрез установленным знакам/разметке при поворотах. Штраф — до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22101.&lawCode=VEH
SAVC||§ 22104|Разворот у пожарной станции|INFRACTION|Запрещён U-разворот перед въездом на территорию пожарной станции/подъездами к ней, а также использование этих въездов/подъездов для разворота. Штраф: $238–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22104
SAVC||§ 22105|Разворот при ограниченном обзоре (200 футов)|INFRACTION|Запрещён U-разворот на дороге, если у водителя нет беспрепятственного обзора на 200 футов в обе стороны. Штраф: $238–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22105.&nodeTreePath=15.6&lawCode=VEH
SAVC||§ 22106|Небезопасное начало движения или движение задним ходом|INFRACTION|Запрещено начинать движение после остановки/стоянки или двигаться задним ходом, пока это не может быть совершено с разумной безопасностью. Штраф: $238–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22106.&nodeTreePath=15.6&lawCode=VEH
SAVC||§ 22107|Неподача сигнала (поворотник) при перестроении|INFRACTION|Запрещено менять направление/полосу, пока манёвр не может быть выполнен с разумной безопасностью, и без подачи соответствующего сигнала. Штраф: $238–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22107
SAVC||§ 22108|Неподача сигнала (поворотник) при повороте|INFRACTION|Сигнал поворота вправо/влево должен подаваться непрерывно на последних 100 футах перед поворотом. Штраф: $238–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22108
SAVC||§ 22109|Резкое снижение скорости или остановка без сигнала|INFRACTION|Запрещено останавливаться или резко снижать скорость без предварительного сигнала водителю, следующему непосредственно позади, при наличии возможности подать сигнал. Штраф: $238–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22109
SAVC||§ 22350|Превышение скорости (Basic Speed Law)|INFRACTION|Движение на скорости, небезопасной для условий дороги, трафика или погоды. Штраф от $35 до $500, при аварии — до 90 дней окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22350.&lawCode=VEH
SAVC||§ 22400|Создание препятствия|INFRACTION|Водитель, который ограничивает движение трафика или останавливается там, где это не предусмотрено при нормальном движении потока транспортных средств. Штраф до $240.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22400
SAVC||§ 22406|Ограничение скорости грузовиков|INFRACTION|Грузовики, автобусы, авто с прицепами — максимум 55 mph. Штраф $100–$500.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22406.&lawCode=VEH
SAVC||§ 22454|Отказ от остановки при мигающих красных сигналах школьного автобуса|INFRACTION|Водитель, подъезжающий к/обгоняющий школьный автобус с включёнными красными мигающими огнями и выдвинутым стоп-указателем, обязан полностью остановиться и оставаться стоять, пока сигнал не будет выключен и автобус не начнёт движение. Штраф до $695.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22454.&lawCode=VEH
SAVC||§ 22500|Неправильная парковка|INFRACTION|Запрещена парковка в определённых местах (тротуар, пожарный гидрант, перекрёсток). Штраф — до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22500.&lawCode=VEH
SAVC||§ 22502|Парковка у бордюра|INFRACTION|Транспортное средство должно располагаться параллельно и не далее 18 дюймов от бордюра. Запрещается парковка против направления движения, за исключением дорог с односторонним движением, где разрешена парковка у левого края проезжей части. Штраф — до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?lawCode=VEH&sectionNum=22502.
SAVC||§ 22508|Парковка при неуплаченном парковочном времени|INFRACTION|Остановка или стоянка на месте, оборудованном парковочным счётчиком, либо на публичной платной парковке, без внесения необходимой оплаты, либо стоянка сверх оплаченного времени. Штраф от 40$ до 80$ в зависимости от юрисдикции (город/округ).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22508&lawCode=VEH
SAVC||§ 22511.1|Парковка на месте для инвалидов без разрешения|INFRACTION|Запрещено занимать парковочные места для инвалидов без соответствующего пермита. Штраф $250–$1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22511.1.&lawCode=VEH
SAVC||§ 22514|Парковка у пожарного гидранта|INFRACTION|Запрещено парковаться ближе 15 футов (~5 м) к пожарному гидранту. Штраф до $100.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22514.&lawCode=VEH
SAVC||§ 22515|Оставление авто без тормоза|INFRACTION|При парковке на уклоне водитель обязан включить тормоз и вывернуть колёса. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22515.&lawCode=VEH
SAVC||§ 22517|Открытие дверей на проезжей части|INFRACTION|Запрещено открывать двери, мешая движению или создавая опасность велосипедистам. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22517.&lawCode=VEH
SAVC||§ 22522|Парковка на тротуаре/пандусе|INFRACTION|Запрещено парковать авто на тротуарах и у пандусов для инвалидов. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22522.&lawCode=VEH
SAVC||§ 22526|Gridlock (блокирование перекрёстка)|INFRACTION|Запрещено выезжать на перекрёсток, если невозможно освободить его. Штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=22526.&lawCode=VEH
SAVC||§ 23103|Опасное вождение (Reckless Driving)|MISDEMEANOR|Вождение «с сознательным пренебрежением к безопасности». Наказание — 5–90 дней окружной и штраф $145–$1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23103.&lawCode=VEH
SAVC||§ 23104|Reckless Driving с травмами|WOBBLER|Опасное вождение, повлёкшее телесные повреждения. Наказание — до 6 мес. окружной (misd.) или 16 мес.–3 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23104.&lawCode=VEH
SAVC||§ 23109|Уличные гонки (Speed Contest)|WOBBLER|Участие в гонках или дрифт-шоу на дорогах общего пользования. 24 часа–90 дней окружной и штраф $355–$1,000. Повторно/с травмами — felony, до 3 лет.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23109.&lawCode=VEH
SAVC||§ 23109(c)|Демонстрация скорости (Exhibition of Speed)|MISDEMEANOR|Умышленное буксование, дрифт или резкие старты на дороге общего пользования. Наказание — до 90 дней окружной тюрьмы и штраф $355–$1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23109.&lawCode=VEH
SAVC||§ 23109.1|Уличные гонки с травмами|FELONY|Speed Contest, повлёкший телесные повреждения. Наказание — 16 мес.–3 лет тюрьмы.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23109.1.&lawCode=VEH
SAVC||§ 23109.2|Зрители уличных гонок|MISDEMEANOR|Запрещено сознательно находиться и участвовать в качестве зрителя в нелегальных гонках. Штраф до $500 и/или до 6 месяцев окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23109.2.&lawCode=VEH
SAVC||§ 23109.5|Организация уличных гонок|WOBBLER|Организация или помощь в проведении нелегальных гонок. Наказание — до 6 мес. окружной (misd.) или до 3 лет тюрьмы (felony).|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23109.5.&lawCode=VEH
SAVC||§ 23110|Бросание предметов в автомобили|WOBBLER|Бросание предметов в движущийся автомобиль. Наказание: до 6 мес. окружной (misd.) или 16 мес.–3 лет тюрьмы (felony) при травмах.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23110.&lawCode=VEH
SAVC||§ 23111|Бросание мусора или окурков из авто|INFRACTION|Запрещено выбрасывать мусор или окурки из движущегося авто. Штраф $100–$1,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23111.&lawCode=VEH
SAVC||§ 23114|Перевозка груза без креплений|INFRACTION|Запрещено перевозить незакреплённый груз, создающий опасность. Штраф до $1,000, при тяжких последствиях — misdemeanor.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23114.&lawCode=VEH
SAVC||§ 23116|Перевозка людей в кузове пикапа/на платформе грузовика на шоссе|INFRACTION|Перевозка людей в кузове пикапа или грузового автомобиля по шоссе без одобренной удерживающей системы. Наказание: штраф до $250.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23116.&lawCode=VEH
SAVC||§ 23123|Использование телефона за рулём|INFRACTION|Запрещено держать мобильный телефон в руке при вождении (только hands-free). Штраф $20 за первое нарушение, $50 за повторное.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23123.&lawCode=VEH
SAVC||§ 23123.5|Текстинг за рулём|INFRACTION|Запрещено набирать текстовые сообщения во время движения (даже с телефоном в держателе). Штраф $20 за первое нарушение, $50 за повторное.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23123.5.&lawCode=VEH
SAVC||§ 23140|DUI для несовершеннолетних|INFRACTION|Для водителей до 21 лет уровень BAC ≥0.01% уже считается DUI. Наказание — штраф $100–$250 и/или при рецидиве — до 6 месяцев окружной.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23140.&lawCode=VEH
SAVC||§ 23152|DUI (алкоголь/наркотики)|WOBBLER|Управление авто с BAC ≥0.08% или под действием наркотиков. 1-е нарушение: штраф $390–$1,000 и до 6 мес. окружной. При рецидиве/жертвах — felony, до 3 лет.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23152.&lawCode=VEH
SAVC||§ 23153|DUI с причинением вреда|FELONY|Вождение в состоянии опьянения, повлекшее телесные повреждения. Наказание — 16 мес.–4 лет тюрьмы и штраф до $5,000.|https://leginfo.legislature.ca.gov/faces/codes_displaySection.xhtml?sectionNum=23153.&lawCode=VEH

USC|18|§ 921|Определения для огнестрельного оружия|INFO|Термины: «огнестрельное оружие», «лицензированный дилер», «боеприпасы», «разрушительное устройство».|https://www.law.cornell.edu/uscode/text/18/921

    // --------------------------------------------------------------
    // Парсер
    // --------------------------------------------------------------
    const laws = rawData.trim().split('\n').filter(line => line).map(line => {
        const p = line.split('|');
        return {
            code: p[0],
            section: p[1] || "—",
            number: p[2],
            title: p[3],
            type: p[4],
            desc: p[5] || "",
            link: p[6] || "#"
        };
    });

    // --------------------------------------------------------------
    // Рендер
    // --------------------------------------------------------------
    const tbody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-group .btn-rounded');
    const clearBtn = document.getElementById('clearFilters');
    const rowCount = document.getElementById('rowCount');
    const filterHint = document.getElementById('filterHint');
    const cardsView = document.getElementById('cardsView');
    const tableWrapper = document.getElementById('tableWrapper');
    const viewTableBtn = document.getElementById('viewTable');
    const viewCardsBtn = document.getElementById('viewCards');
    const autocompleteList = document.getElementById('autocompleteList');

    let currentFilter = 'all';
    let currentSearch = '';
    let currentView = 'table';
    let sortField = '';
    let sortOrder = 'asc';

    // Автодополнение
    function showAutocomplete(query) {
        if (!query || query.length < 1) {
            autocompleteList.classList.remove('show');
            return;
        }
        const q = query.toLowerCase();
        const matches = laws.filter(item => 
            item.title.toLowerCase().includes(q) || 
            item.code.toLowerCase().includes(q) ||
            item.number.toLowerCase().includes(q)
        ).slice(0, 8);

        if (matches.length === 0) {
            autocompleteList.classList.remove('show');
            return;
        }

        let html = '';
        matches.forEach(item => {
            const highlightedTitle = highlightText(item.title, query);
            html += `<div class="autocomplete-item" data-value="${item.code} ${item.number}">${highlightedTitle}</div>`;
        });
        autocompleteList.innerHTML = html;
        autocompleteList.classList.add('show');

        autocompleteList.querySelectorAll('.autocomplete-item').forEach(el => {
            el.addEventListener('click', function() {
                searchInput.value = this.textContent;
                currentSearch = this.textContent;
                autocompleteList.classList.remove('show');
                renderTable();
            });
        });
    }

    searchInput.addEventListener('input', function() {
        currentSearch = this.value;
        showAutocomplete(this.value);
        renderTable();
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-wrap')) {
            autocompleteList.classList.remove('show');
        }
    });

    // Виды отображения
    viewTableBtn.addEventListener('click', function() {
        viewTableBtn.classList.add('active');
        viewCardsBtn.classList.remove('active');
        currentView = 'table';
        tableWrapper.classList.remove('hidden');
        cardsView.classList.remove('show');
        renderTable();
    });

    viewCardsBtn.addEventListener('click', function() {
        viewCardsBtn.classList.add('active');
        viewTableBtn.classList.remove('active');
        currentView = 'cards';
        tableWrapper.classList.add('hidden');
        cardsView.classList.add('show');
        renderTable();
    });

    // Сортировка
    document.querySelectorAll('th[data-sort]').forEach(th => {
        th.addEventListener('click', function() {
            const field = this.dataset.sort;
            if (sortField === field) {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortOrder = 'asc';
            }
            document.querySelectorAll('th[data-sort]').forEach(h => h.classList.remove('sorted', 'sorted-asc', 'sorted-desc'));
            this.classList.add('sorted', `sorted-${sortOrder}`);
            renderTable();
        });
    });

    function highlightText(text, query) {
        if (!query || query.trim() === '') return text;
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
    }

    function renderTable() {
        let filtered = laws.filter(item => {
            if (currentFilter !== 'all' && item.type !== currentFilter) return false;
            if (currentSearch.trim() !== '') {
                const q = currentSearch.trim().toLowerCase();
                const inTitle = item.title.toLowerCase().includes(q);
                const inDesc = item.desc.toLowerCase().includes(q);
                const inNumber = item.number.toLowerCase().includes(q);
                const inCode = item.code.toLowerCase().includes(q);
                const inSection = item.section.toLowerCase().includes(q);
                if (!(inTitle || inDesc || inNumber || inCode || inSection)) return false;
            }
            return true;
        });

        if (sortField) {
            filtered.sort((a, b) => {
                let valA = a[sortField] || '';
                let valB = b[sortField] || '';
                if (sortField === 'number') {
                    valA = parseFloat(valA.replace(/[^0-9.]/g, '')) || 0;
                    valB = parseFloat(valB.replace(/[^0-9.]/g, '')) || 0;
                } else {
                    valA = valA.toString().toLowerCase();
                    valB = valB.toString().toLowerCase();
                }
                if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });
        }

        if (filtered.length === 0) {
            const emptyMsg = `<div class="empty-state">Ничего не найдено по вашему запросу</div>`;
            tbody.innerHTML = `<tr><td colspan="7" class="empty-state">Ничего не найдено по вашему запросу</td></tr>`;
            cardsView.innerHTML = emptyMsg;
            rowCount.textContent = 'Записей: 0';
            filterHint.textContent = 'Нет совпадений';
            return;
        }

        const query = currentSearch.trim();

        // Таблица
        let tableHtml = '';
        filtered.forEach((item, index) => {
            const typeClass = item.type.toLowerCase();
            const delay = Math.min(index * 25, 300);
            
            tableHtml += `<tr class="row-animate" style="animation-delay: ${delay}ms">
                <td class="code-cell">${query ? highlightText(item.code, query) : item.code}</td>
                <td>${query ? highlightText(item.section, query) : item.section}</td>
                <td><strong>${query ? highlightText(item.number, query) : item.number}</strong></td>
                <td>${query ? highlightText(item.title, query) : item.title}</td>
                <td><span class="type-badge ${typeClass}">${item.type}</span></td>
                <td>${query ? highlightText(item.desc, query) : item.desc}</td>
                <td class="action-cell"><a href="${item.link}" target="_blank">Перейти</a></td>
            </tr>`;
        });
        tbody.innerHTML = tableHtml;

        // Карточки
        let cardsHtml = '';
        filtered.forEach((item, index) => {
            const typeClass = item.type.toLowerCase();
            const delay = Math.min(index * 25, 300);
            cardsHtml += `
                <div class="law-card" style="animation-delay: ${delay}ms">
                    <div class="card-header">
                        <span class="card-code">${item.code} ${item.number}</span>
                        <span class="type-badge ${typeClass}">${item.type}</span>
                    </div>
                    <div class="card-title">${query ? highlightText(item.title, query) : item.title}</div>
                    <div class="card-desc">${query ? highlightText(item.desc, query) : item.desc}</div>
                    <div class="card-footer">
                        <span style="font-size:0.8rem;color:var(--text-muted);">${item.section}</span>
                        <a href="${item.link}" target="_blank" style="color:#3a6b8f;text-decoration:none;font-weight:500;">Подробнее →</a>
                    </div>
                </div>
            `;
        });
        cardsView.innerHTML = cardsHtml;

        rowCount.textContent = `Записей: ${filtered.length}`;
        filterHint.textContent = currentFilter === 'all' ? 'Показаны все' : `Фильтр: ${currentFilter}`;
    }

    // Фильтры
    filterBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            filterBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.type;
            renderTable();
        });
    });

    clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        currentSearch = '';
        autocompleteList.classList.remove('show');
        filterBtns.forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-group .btn-rounded[data-type="all"]').classList.add('active');
        currentFilter = 'all';
        renderTable();
    });

    // Кнопка "Наверх"
    const backToTopBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 300) {
            backToTopBtn.classList.add('show');
        } else {
            backToTopBtn.classList.remove('show');
        }
    });
    backToTopBtn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Тёмная тема
    const themeToggle = document.getElementById('themeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

    function setTheme(isDark) {
        if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = 'Светлая';
        } else {
            document.documentElement.removeAttribute('data-theme');
            themeToggle.textContent = 'Тёмная';
        }
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        setTheme(savedTheme === 'dark');
    } else {
        setTheme(prefersDark.matches);
    }

    prefersDark.addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
            setTheme(e.matches);
        }
    });

    themeToggle.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        setTheme(!isDark);
    });

    renderTable();
</script>
</body>
</html>
